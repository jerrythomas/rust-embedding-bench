<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">

  <!-- Constants:
       canvas      1200 x 630
       bar origin  x=280
       max width   760 (= 9676 eps)
       loop dur    8s
       sequence    grow 0-3s, hold 3-7.5s, fade out 7.5-8s
  -->

  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#e6e3d9"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#faf9f3"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title block -->
  <text x="60" y="64" font-size="30" font-weight="700" fill="#1a2238" letter-spacing="-0.5">
    rust embedding benchmark
  </text>
  <text x="60" y="92" font-size="14" fill="#7a766c" letter-spacing="0.4">
    embeddings per second  —  all-MiniLM-L6-v2  —  short text, batch=32, threads=8  —  Apple M4 Max
  </text>

  <!-- Column headers -->
  <text x="60" y="138" font-size="11" fill="#a8a39a" letter-spacing="1.6" font-weight="600">BACKEND</text>
  <text x="280" y="138" font-size="11" fill="#a8a39a" letter-spacing="1.6" font-weight="600">THROUGHPUT</text>

  <!-- ROW 1: llama-cpp-2 (winner) -->
  <text x="60" y="186" font-size="22" font-weight="500" fill="#1a2238">llama-cpp-2</text>
  <rect x="280" y="166" height="28" rx="3" fill="#ff8c42">
    <animate attributeName="width"
             values="0;760;760;0" keyTimes="0;0.375;0.9375;1"
             dur="8s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.2 0.8 0.3 1;0 0 1 1;0.4 0 0.8 0.3"/>
  </rect>
  <text x="1056" y="186" font-size="22" font-weight="700" fill="#1a2238" opacity="0">9 676
    <animate attributeName="opacity"
             values="0;0;1;1;0" keyTimes="0;0.4;0.45;0.92;1"
             dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- ROW 2: ort -->
  <text x="60" y="256" font-size="22" font-weight="500" fill="#1a2238">ort</text>
  <rect x="280" y="236" height="28" rx="3" fill="#1a2238">
    <animate attributeName="width"
             values="0;240;240;0" keyTimes="0;0.375;0.9375;1"
             dur="8s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.2 0.8 0.3 1;0 0 1 1;0.4 0 0.8 0.3"/>
  </rect>
  <text x="536" y="256" font-size="22" font-weight="500" fill="#1a2238" opacity="0">3 052
    <animate attributeName="opacity"
             values="0;0;1;1;0" keyTimes="0;0.4;0.45;0.92;1"
             dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- ROW 3: fastembed -->
  <text x="60" y="326" font-size="22" font-weight="500" fill="#1a2238">fastembed</text>
  <rect x="280" y="306" height="28" rx="3" fill="#1a2238">
    <animate attributeName="width"
             values="0;224;224;0" keyTimes="0;0.375;0.9375;1"
             dur="8s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.2 0.8 0.3 1;0 0 1 1;0.4 0 0.8 0.3"/>
  </rect>
  <text x="520" y="326" font-size="22" font-weight="500" fill="#1a2238" opacity="0">2 849
    <animate attributeName="opacity"
             values="0;0;1;1;0" keyTimes="0;0.4;0.45;0.92;1"
             dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- ROW 4: candle -->
  <text x="60" y="396" font-size="22" font-weight="500" fill="#1a2238">candle</text>
  <rect x="280" y="376" height="28" rx="3" fill="#1a2238">
    <animate attributeName="width"
             values="0;47;47;0" keyTimes="0;0.375;0.9375;1"
             dur="8s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.2 0.8 0.3 1;0 0 1 1;0.4 0 0.8 0.3"/>
  </rect>
  <text x="343" y="396" font-size="22" font-weight="500" fill="#1a2238" opacity="0">603
    <animate attributeName="opacity"
             values="0;0;1;1;0" keyTimes="0;0.4;0.45;0.92;1"
             dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- ROW 5: ollama -->
  <text x="60" y="466" font-size="22" font-weight="500" fill="#1a2238">ollama</text>
  <rect x="280" y="446" height="28" rx="3" fill="#1a2238">
    <animate attributeName="width"
             values="0;36;36;0" keyTimes="0;0.375;0.9375;1"
             dur="8s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.2 0.8 0.3 1;0 0 1 1;0.4 0 0.8 0.3"/>
  </rect>
  <text x="332" y="466" font-size="22" font-weight="500" fill="#1a2238" opacity="0">461
    <animate attributeName="opacity"
             values="0;0;1;1;0" keyTimes="0;0.4;0.45;0.92;1"
             dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- X axis -->
  <line x1="280" y1="510" x2="1040" y2="510" stroke="#d0cdc3" stroke-width="1"/>
  <line x1="280" y1="506" x2="280" y2="514" stroke="#a8a39a" stroke-width="1"/>
  <line x1="660" y1="506" x2="660" y2="514" stroke="#a8a39a" stroke-width="1"/>
  <line x1="1040" y1="506" x2="1040" y2="514" stroke="#a8a39a" stroke-width="1"/>
  <text x="280" y="532" font-size="11" fill="#a8a39a" letter-spacing="0.5" text-anchor="start">0</text>
  <text x="660" y="532" font-size="11" fill="#a8a39a" letter-spacing="0.5" text-anchor="middle">4 838</text>
  <text x="1040" y="532" font-size="11" fill="#a8a39a" letter-spacing="0.5" text-anchor="end">9 676</text>
  <text x="660" y="552" font-size="11" fill="#a8a39a" letter-spacing="1" text-anchor="middle" font-weight="600">EMBEDDINGS / SECOND</text>

  <!-- Footer -->
  <text x="60" y="600" font-size="13" fill="#1a2238" font-weight="500">github.com/jerrythomas/rust-embedding-bench</text>
  <text x="1140" y="600" font-size="11" fill="#a8a39a" letter-spacing="0.8" text-anchor="end">make bench  ·  MIT</text>
</svg>
